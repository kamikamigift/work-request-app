<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="仕事依頼書">
<meta name="theme-color" content="#0071E3">
<title>仕事依頼書</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F5F5F7;--surface:#FFFFFF;--surface2:#F5F5F7;--surface3:#E8E8ED;
  --border:#E8E8ED;--border2:#D2D2D7;
  --text1:#1D1D1F;--text2:#515154;--text3:#86868B;
  --accent:#0071E3;--accent2:#0077ED;--accent-bg:#F0F7FF;
  --rec:#FF3B30;
  --radius:18px;--radius-sm:12px;
  --shadow-sm:0 1px 4px rgba(0,0,0,.04);
  --shadow:0 2px 12px rgba(0,0,0,.06);
  --shadow-md:0 8px 32px rgba(0,0,0,.10);
}
html{scroll-behavior:smooth}
body{font-family:'Inter','Noto Sans JP',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text1);min-height:100vh;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;padding-bottom:120px}

/* Header */
.header{background:linear-gradient(135deg,#0071E3,#3395F0);padding:0 max(20px,calc((100vw - 720px)/2));height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 10px rgba(0,90,180,.28)}
.logo{font-size:20px;font-weight:700;color:#fff;letter-spacing:-.022em;display:flex;align-items:center;gap:9px}
.logo-sub{font-size:11px;color:rgba(255,255,255,.75);letter-spacing:.06em;font-weight:500}
.hist-btn{background:rgba(255,255,255,.18);border:none;color:#fff;font-family:inherit;font-size:14px;font-weight:600;padding:8px 14px;border-radius:980px;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap}
.hist-btn:hover{background:rgba(255,255,255,.28)}
.hist-badge{background:#fff;color:var(--accent);font-size:11px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:none;align-items:center;justify-content:center;padding:0 5px}

.wrap{max-width:720px;margin:0 auto;padding:28px max(20px,calc((100vw - 720px)/2)) 40px}

/* Cards */
.card{background:var(--surface);border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:22px 22px 24px;margin-bottom:18px}
.card-title{font-size:13px;font-weight:600;color:var(--accent);letter-spacing:.02em;margin-bottom:16px;display:flex;align-items:center;gap:8px}
.card-title .num{background:var(--accent);color:#fff;width:22px;height:22px;border-radius:7px;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}

/* Fields */
.field{margin-bottom:16px}
.field:last-child{margin-bottom:0}
.flabel{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:7px;display:block}
.req{color:var(--rec);font-size:11px;margin-left:4px;font-weight:600}
.inp,.ta{width:100%;border:1.5px solid var(--border2);border-radius:var(--radius-sm);padding:12px 14px;font-size:16px;font-family:inherit;color:var(--text1);background:var(--surface);outline:none;transition:border-color .15s,box-shadow .15s}
.inp:focus,.ta:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,113,227,.14)}
.ta{resize:vertical;min-height:96px;line-height:1.7}
.row{display:flex;gap:12px;flex-wrap:wrap}
.row .field{flex:1;min-width:150px;margin-bottom:0}

/* voice field wrapper */
.voice-wrap{position:relative}
.mic{position:absolute;right:8px;bottom:8px;width:42px;height:42px;border-radius:50%;border:none;background:var(--accent-bg);color:var(--accent);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,transform .12s;box-shadow:var(--shadow-sm)}
.mic:hover{background:#E1EFFF}
.mic:active{transform:scale(.92)}
.mic.rec{background:var(--rec);color:#fff;animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,59,48,.45)}50%{box-shadow:0 0 0 10px rgba(255,59,48,0)}}
.mic svg{width:20px;height:20px}
.mic-hint{position:absolute;right:58px;bottom:16px;font-size:12px;color:var(--rec);font-weight:600;background:#fff;padding:2px 8px;border-radius:20px;box-shadow:var(--shadow-sm);display:none;white-space:nowrap}
.mic.rec ~ .mic-hint{display:block}

/* checkbox / radio pills */
.pills{display:flex;gap:8px;flex-wrap:wrap}
.pill{position:relative;cursor:pointer}
.pill input{position:absolute;opacity:0;pointer-events:none}
.pill span{display:inline-flex;align-items:center;gap:5px;padding:9px 16px;border:1.5px solid var(--border2);border-radius:980px;font-size:14px;font-weight:500;color:var(--text2);transition:all .15s;user-select:none}
.pill input:checked + span{background:var(--accent);border-color:var(--accent);color:#fff}
.pill input:focus-visible + span{box-shadow:0 0 0 3px rgba(0,113,227,.25)}

.subcard{background:var(--surface2);border-radius:var(--radius-sm);padding:14px 16px;margin-top:6px}
.subrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.subrow:last-child{margin-bottom:0}
.subrow .sublabel{font-size:13px;font-weight:600;color:var(--text2);min-width:76px}
.inp-sm{border:1.5px solid var(--border2);border-radius:9px;padding:8px 10px;font-size:15px;font-family:inherit;background:var(--surface);outline:none;color:var(--text1)}
.inp-sm:focus{border-color:var(--accent)}

/* send bar */
.sendbar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.82);backdrop-filter:saturate(180%) blur(20px);-webkit-backdrop-filter:saturate(180%) blur(20px);border-top:1px solid var(--border);padding:14px max(20px,calc((100vw - 720px)/2)) calc(14px + env(safe-area-inset-bottom));z-index:90}
.sendbar-inner{max-width:720px;margin:0 auto;display:flex;gap:10px}
.btn{flex:1;height:52px;border:none;border-radius:14px;font-size:16px;font-family:inherit;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:background .16s,transform .1s}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2)}
.btn-ghost{background:var(--surface3);color:var(--text1);flex:0 0 auto;padding:0 16px;font-size:14px}
.btn-ghost:hover{background:#DEDEE3}

/* settings */
.settings{margin-bottom:18px}
.settings summary{cursor:pointer;font-size:13px;color:var(--text3);font-weight:500;list-style:none;display:flex;align-items:center;gap:6px;padding:4px 0}
.settings summary::-webkit-details-marker{display:none}
.settings[open] summary{margin-bottom:12px;color:var(--text2)}
.help{font-size:12px;color:var(--text3);line-height:1.7;margin-top:8px}

/* toast */
.toast{position:fixed;bottom:96px;left:50%;transform:translateX(-50%) translateY(20px);background:#1D1D1F;color:#fff;padding:12px 22px;border-radius:14px;font-size:14px;font-weight:500;box-shadow:var(--shadow-md);opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:400;max-width:88vw;text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.notice{background:#FFF8E6;border:1px solid #F5E4B3;border-radius:var(--radius-sm);padding:12px 14px;font-size:12.5px;color:#8A6D00;line-height:1.65;margin-bottom:18px}

/* 履歴モーダル */
.modal-back{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:300;display:none;align-items:flex-end;justify-content:center}
.modal-back.show{display:flex}
.modal{background:var(--surface);width:100%;max-width:640px;max-height:88vh;border-radius:20px 20px 0 0;display:flex;flex-direction:column;overflow:hidden}
@media(min-width:641px){.modal-back{align-items:center}.modal{border-radius:20px}}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 20px;border-bottom:1px solid var(--border);font-size:16px;font-weight:700}
.modal-head button{border:none;background:var(--surface3);width:32px;height:32px;border-radius:50%;font-size:15px;cursor:pointer;color:var(--text2)}
#histList{overflow-y:auto;padding:14px 16px calc(24px + env(safe-area-inset-bottom))}
.hist-empty{color:var(--text3);text-align:center;padding:36px 10px;font-size:14px;line-height:1.8}
.hist-item{background:var(--surface2);border-radius:14px;padding:14px 16px;margin-bottom:12px}
.hist-meta{font-size:12px;color:var(--text3);font-weight:500;margin-bottom:5px}
.hist-title{font-size:15px;font-weight:600;color:var(--text1);cursor:pointer;line-height:1.5}
.hist-title::before{content:'▸ ';color:var(--accent)}
.hist-item.open .hist-title::before{content:'▾ '}
.hist-body{display:none;white-space:pre-wrap;font-size:13px;color:var(--text2);background:var(--surface);border-radius:10px;padding:12px;margin-top:10px;line-height:1.7;max-height:320px;overflow-y:auto}
.hist-item.open .hist-body{display:block}
.hist-actions{display:flex;gap:8px;margin-top:10px}
.hist-actions button{border:none;background:var(--accent-bg);color:var(--accent);font-family:inherit;font-size:13px;font-weight:600;padding:7px 14px;border-radius:9px;cursor:pointer}
.hist-actions button.del{background:#FFECEB;color:var(--rec)}

/* 送信前プレビュー */
.preview-scroll{overflow-y:auto;padding:16px 20px;flex:1}
.preview-to{font-size:12.5px;color:var(--text3);margin-bottom:8px}
.preview-subj{font-size:16px;font-weight:700;color:var(--text1);padding-bottom:12px;margin-bottom:12px;border-bottom:1px solid var(--border);line-height:1.5}
.preview-body{white-space:pre-wrap;font-size:14px;color:var(--text1);line-height:1.85;word-break:break-word}
.preview-actions{display:flex;gap:10px;padding:14px 20px calc(16px + env(safe-area-inset-bottom));border-top:1px solid var(--border)}
.preview-actions .btn{height:50px}
.preview-actions .pv-back{flex:0 0 auto;padding:0 20px;font-size:15px}
</style>
</head>
<body>

<div class="header">
  <div class="logo">📝 仕事依頼書<span class="logo-sub" style="margin-left:2px">WORK REQUEST</span></div>
  <button class="hist-btn" onclick="openHistory()">🕘 履歴<span class="hist-badge" id="histBadge"></span></button>
</div>

<div class="wrap">

  <div class="notice" id="voiceNotice" style="display:none">
    ⚠️ このブラウザは音声入力に対応していないため、マイクボタンは表示されません。文字入力はそのままお使いいただけます。<br>
    （音声入力を使うには <strong>Chrome</strong> か <strong>Safari</strong> でお開きください）
  </div>

  <!-- 基本情報 -->
  <div class="card">
    <div class="card-title">基本情報</div>
    <div class="row">
      <div class="field"><label class="flabel">依頼日</label><input type="date" class="inp" id="reqDate"></div>
      <div class="field"><label class="flabel">希望期日</label><input type="date" class="inp" id="dueDate"></div>
    </div>
    <div class="row" style="margin-top:16px">
      <div class="field"><label class="flabel">依頼者<span class="req">必須</span></label><input type="text" class="inp" id="requester" placeholder="お名前"></div>
      <div class="field"><label class="flabel">実行者<span class="req">必須</span></label><input type="text" class="inp" id="doer" placeholder="シウン" value="シウン"></div>
    </div>
    <div class="field" style="margin-top:16px"><label class="flabel">依頼場所</label><input type="text" class="inp" id="place" placeholder="例：事務所 / オンライン"></div>
    <div class="field" style="margin-top:16px">
      <label class="flabel">やりとり方法</label>
      <div class="pills" id="methodPills">
        <label class="pill"><input type="checkbox" value="対面"><span>対面</span></label>
        <label class="pill"><input type="checkbox" value="LINE"><span>LINE</span></label>
        <label class="pill"><input type="checkbox" value="メール"><span>メール</span></label>
        <label class="pill"><input type="checkbox" value="電話"><span>電話</span></label>
      </div>
      <input type="email" class="inp" id="methodEmail" placeholder="📧 メールアドレスを入力" autocomplete="email" style="display:none;margin-top:10px">
      <input type="tel" class="inp" id="methodPhone" placeholder="📞 電話番号を入力" autocomplete="tel" style="display:none;margin-top:10px">
    </div>
  </div>

  <!-- 01 依頼内容 -->
  <div class="card">
    <div class="card-title"><span class="num">1</span>依頼内容<span class="req">必須</span></div>
    <div class="voice-wrap">
      <textarea class="ta" id="content" placeholder="何をお願いしたいか（マイクで話しても入力できます）"></textarea>
      <button class="mic" data-target="content" aria-label="音声入力"></button>
      <div class="mic-hint">聞き取り中…</div>
    </div>
  </div>

  <!-- 02 詳細 -->
  <div class="card">
    <div class="card-title"><span class="num">2</span>詳細</div>
    <div class="voice-wrap">
      <textarea class="ta" id="detail" placeholder="背景・条件・参考など（マイクで話しても入力できます）"></textarea>
      <button class="mic" data-target="detail" aria-label="音声入力"></button>
      <div class="mic-hint">聞き取り中…</div>
    </div>
  </div>

  <!-- 03 スケジュール -->
  <div class="card">
    <div class="card-title"><span class="num">3</span>希望期日・スケジュール</div>
    <div class="subcard">
      <div class="subrow">
        <span class="sublabel">希望期日</span>
        <input type="date" class="inp-sm" id="deadlineDate">
        <input type="time" class="inp-sm" id="deadlineTime"><span style="font-size:13px;color:var(--text2)">まで</span>
      </div>
      <div class="subrow">
        <span class="sublabel">優先度</span>
        <div class="pills">
          <label class="pill"><input type="radio" name="prio" value="高（最優先）"><span>高（最優先）</span></label>
          <label class="pill"><input type="radio" name="prio" value="中"><span>中</span></label>
          <label class="pill"><input type="radio" name="prio" value="低"><span>低</span></label>
        </div>
      </div>
      <div class="subrow">
        <span class="sublabel">中間確認</span>
        <div class="pills">
          <label class="pill"><input type="radio" name="mid" value="なし" checked><span>なし</span></label>
          <label class="pill"><input type="radio" name="mid" value="あり"><span>あり</span></label>
        </div>
        <input type="date" class="inp-sm" id="midWhen" style="display:none"><span id="midWhenSuffix" style="font-size:13px;color:var(--text2);display:none">頃に確認</span>
      </div>
    </div>
  </div>

  <!-- 04 その他 -->
  <div class="card">
    <div class="card-title"><span class="num">4</span>その他連絡事項</div>
    <div class="voice-wrap">
      <textarea class="ta" id="other" placeholder="補足があれば（マイクで話しても入力できます）"></textarea>
      <button class="mic" data-target="other" aria-label="音声入力"></button>
      <div class="mic-hint">聞き取り中…</div>
    </div>
  </div>

  <!-- 送信先設定 -->
  <details class="settings card" style="padding:16px 22px">
    <summary>⚙️ 送信先メールアドレスの設定</summary>
    <div class="field">
      <label class="flabel">この依頼書を届けるメールアドレス</label>
      <input type="email" class="inp" id="toAddr" placeholder="you@example.com">
      <div class="help">ここに入れたアドレス宛に依頼書が届きます。一度入れると次回も自動で入ります（この端末に保存）。</div>
    </div>
  </details>

</div>

<!-- 送信バー -->
<div class="sendbar">
  <div class="sendbar-inner">
    <button class="btn btn-ghost" onclick="doCopy()" title="本文をコピー（LINE等に貼れます）">📋</button>
    <button class="btn btn-primary" onclick="openPreview()">📧 メールで送る</button>
  </div>
</div>

<!-- 送信前プレビュー -->
<div class="modal-back" id="previewModal" onclick="if(event.target===this)closePreview()">
  <div class="modal">
    <div class="modal-head"><span>📄 送信前の確認</span><button onclick="closePreview()" aria-label="閉じる">✕</button></div>
    <div class="preview-scroll">
      <div class="preview-to">送信先：<span id="pvTo"></span></div>
      <div class="preview-subj" id="pvSubj"></div>
      <div class="preview-body" id="pvBody"></div>
    </div>
    <div class="preview-actions">
      <button class="btn btn-ghost pv-back" onclick="closePreview()">← もどる</button>
      <button class="btn btn-primary" onclick="confirmSend()">✅ この内容で送信</button>
    </div>
  </div>
</div>

<!-- 履歴モーダル -->
<div class="modal-back" id="histModal" onclick="if(event.target===this)closeHistory()">
  <div class="modal">
    <div class="modal-head"><span>🕘 送信した依頼（この端末の控え）</span><button onclick="closeHistory()" aria-label="閉じる">✕</button></div>
    <div id="histList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const $=id=>document.getElementById(id);
const TO_KEY='wr_to_addr', REQ_KEY='wr_requester', DRAFT_KEY='wr_draft', HIST_KEY='wr_history';
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}

// 日付の初期値（今日）
function todayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}

// ── 曜日つき日付表示 ──
const WD=['日','月','火','水','木','金','土'];
function fmtDate(v){if(!v)return'';const d=new Date(v+'T00:00:00');if(isNaN(d))return v;return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${WD[d.getDay()]}）`}

// ── 入力欄の出し分け（中間確認あり／メール・電話）──
function applyToggles(){
  const midEl=document.querySelector('input[name=mid]:checked');
  const showMid=(midEl&&midEl.value==='あり');
  $('midWhen').style.display=showMid?'inline-block':'none';
  $('midWhenSuffix').style.display=showMid?'inline':'none';
  const m=[...document.querySelectorAll('#methodPills input:checked')].map(c=>c.value);
  $('methodEmail').style.display=m.includes('メール')?'block':'none';
  $('methodPhone').style.display=m.includes('電話')?'block':'none';
}

// ── 自動保存（下書き）──　※送信するまで消えずに残る
const DRAFT_IDS=['reqDate','dueDate','requester','doer','place','methodEmail','methodPhone','content','detail','deadlineDate','deadlineTime','midWhen','other'];
function collectDraft(){
  const d={v:{},methods:[],prio:'',mid:'なし'};
  DRAFT_IDS.forEach(id=>d.v[id]=$(id).value);
  d.methods=[...document.querySelectorAll('#methodPills input:checked')].map(c=>c.value);
  const p=document.querySelector('input[name=prio]:checked'); d.prio=p?p.value:'';
  const m=document.querySelector('input[name=mid]:checked'); d.mid=m?m.value:'なし';
  return d;
}
function applyDraft(d){
  if(!d)return;
  DRAFT_IDS.forEach(id=>{if(d.v&&d.v[id]!=null)$(id).value=d.v[id]});
  document.querySelectorAll('#methodPills input').forEach(c=>c.checked=(d.methods||[]).includes(c.value));
  document.querySelectorAll('input[name=prio]').forEach(r=>r.checked=(r.value===d.prio));
  const midEl=document.querySelector(`input[name=mid][value="${d.mid||'なし'}"]`); if(midEl)midEl.checked=true;
  applyToggles();
}
function saveDraft(){try{localStorage.setItem(DRAFT_KEY,JSON.stringify(collectDraft()))}catch(e){}}
function loadDraft(){const raw=localStorage.getItem(DRAFT_KEY);if(!raw)return false;try{applyDraft(JSON.parse(raw));return true}catch(e){return false}}

// ── 送信履歴（控え）──
function getHistory(){try{return JSON.parse(localStorage.getItem(HIST_KEY)||'[]')}catch(e){return[]}}
function renderBadge(){const n=getHistory().length;const b=$('histBadge');b.textContent=n||'';b.style.display=n?'inline-flex':'none'}
function addHistory(){
  const hist=getHistory();
  hist.unshift({
    id:Date.now(), sentAt:new Date().toISOString(),
    requester:$('requester').value.trim(), doer:$('doer').value.trim(),
    content:$('content').value.trim(), subject:buildSubject(), body:buildBody(),
    snapshot:collectDraft()
  });
  try{localStorage.setItem(HIST_KEY,JSON.stringify(hist.slice(0,200)))}catch(e){}
  renderBadge();
}
function renderHistory(){
  const list=getHistory(), box=$('histList');
  if(!list.length){box.innerHTML='<p class="hist-empty">まだ送信した依頼はありません。<br>「📧 Gmailで送る」を押すと、ここに控えが残ります。</p>';return}
  box.innerHTML=list.map(h=>{
    const d=new Date(h.sentAt);
    const dt=`${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}（${WD[d.getDay()]}）${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    return `<div class="hist-item">
      <div class="hist-meta">${esc(dt)}　依頼者：${esc(h.requester||'—')}</div>
      <div class="hist-title" onclick="this.closest('.hist-item').classList.toggle('open')">${esc(h.content||h.subject||'(内容なし)')}</div>
      <div class="hist-body">${esc(h.body)}</div>
      <div class="hist-actions">
        <button onclick="restoreHistory(${h.id})">この内容で作り直す</button>
        <button class="del" onclick="deleteHistory(${h.id})">控えを削除</button>
      </div>
    </div>`;
  }).join('');
}
function openHistory(){renderHistory();$('histModal').classList.add('show')}
function closeHistory(){$('histModal').classList.remove('show')}
function deleteHistory(id){
  if(!confirm('この控えを削除しますか？'))return;
  const list=getHistory().filter(h=>h.id!==id);
  localStorage.setItem(HIST_KEY,JSON.stringify(list));
  renderHistory();renderBadge();
}
function restoreHistory(id){
  const h=getHistory().find(x=>x.id===id); if(!h)return;
  applyDraft(h.snapshot||{}); saveDraft(); closeHistory();
  window.scrollTo(0,0); showToast('この内容をフォームに戻しました');
}

// ── 音声入力（Web Speech API）──
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(!SR){
  $('voiceNotice').style.display='block';
  document.querySelectorAll('.mic').forEach(b=>b.style.display='none');
}else{
  const MIC_SVG='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>';
  const STOP_SVG='<svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2.5"/></svg>';
  document.querySelectorAll('.mic').forEach(b=>b.innerHTML=MIC_SVG);
  let rec=null,activeBtn=null;
  function stopRec(){if(rec){try{rec.stop()}catch(e){}}}
  document.querySelectorAll('.mic').forEach(btn=>{
    btn.addEventListener('click',()=>{
      if(activeBtn===btn){stopRec();return}
      if(rec){stopRec()}
      const ta=$(btn.dataset.target);
      rec=new SR();rec.lang='ja-JP';rec.interimResults=true;rec.continuous=true;
      let base=ta.value;
      activeBtn=btn;btn.classList.add('rec');btn.innerHTML=STOP_SVG;
      rec.onresult=e=>{
        let fin='',itm='';
        for(let i=e.resultIndex;i<e.results.length;i++){
          const t=e.results[i][0].transcript;
          if(e.results[i].isFinal)fin+=t;else itm+=t;
        }
        if(fin){base=base?base+fin:fin}
        ta.value=base+itm; saveDraft();
      };
      rec.onerror=e=>{if(e.error==='not-allowed'||e.error==='service-not-allowed')showToast('マイクの使用が許可されていません');};
      rec.onend=()=>{btn.classList.remove('rec');btn.innerHTML=MIC_SVG;if(activeBtn===btn)activeBtn=null;rec=null;saveDraft()};
      try{rec.start()}catch(e){showToast('音声入力を開始できませんでした')}
    });
  });
}

// ── 本文組み立て ──
function getMethods(){
  return [...document.querySelectorAll('#methodPills input:checked')].map(c=>{
    if(c.value==='メール'){const e=$('methodEmail').value.trim();return e?`メール（${e}）`:'メール'}
    if(c.value==='電話'){const p=$('methodPhone').value.trim();return p?`電話（${p}）`:'電話'}
    return c.value;
  }).join(' / ');
}
function getPrio(){const r=document.querySelector('input[name=prio]:checked');return r?r.value:''}
function getMid(){
  const el=document.querySelector('input[name=mid]:checked');
  if(el&&el.value==='あり'){const w=$('midWhen').value;return 'あり'+(w?`（${fmtDate(w)}頃に進捗確認）`:'')}
  return 'なし';
}
function buildBody(){
  const L=[];
  L.push('【仕事依頼書】');L.push('');
  L.push('■ 依頼日：'+fmtDate($('reqDate').value));
  if($('dueDate').value)L.push('■ 希望期日：'+fmtDate($('dueDate').value));
  L.push('■ 依頼者：'+($('requester').value.trim()||'（未記入）'));
  if($('place').value.trim())L.push('■ 依頼場所：'+$('place').value.trim());
  if(getMethods())L.push('■ やりとり方法：'+getMethods());
  if($('doer').value.trim())L.push('■ 実行者：'+$('doer').value.trim());
  L.push('');
  L.push('━━━ 01. 依頼内容 ━━━');
  L.push($('content').value.trim()||'（未記入）');
  L.push('');
  if($('detail').value.trim()){L.push('━━━ 02. 詳細 ━━━');L.push($('detail').value.trim());L.push('')}
  L.push('━━━ 03. 希望期日・スケジュール ━━━');
  const dl=$('deadlineDate').value, tm=$('deadlineTime').value;
  if(dl||tm)L.push('希望期日：'+fmtDate(dl)+(tm?' '+tm:'')+'まで');
  if(getPrio())L.push('優先度：'+getPrio());
  L.push('中間確認：'+getMid());
  L.push('');
  if($('other').value.trim()){L.push('━━━ 04. その他連絡事項 ━━━');L.push($('other').value.trim());L.push('')}
  return L.join('\n');
}
function buildSubject(){
  const who=$('requester').value.trim();
  return '仕事依頼'+(who?'（'+who+'）':'');
}
function validate(){
  if(!$('requester').value.trim()){showToast('依頼者のお名前を入れてください');$('requester').focus();return false}
  if(!$('doer').value.trim()){showToast('実行者を入れてください');$('doer').focus();return false}
  if(!$('content').value.trim()){showToast('依頼内容を入れてください');$('content').focus();return false}
  if(!$('toAddr').value.trim()){showToast('送信先アドレスを設定してください（⚙️）');return false}
  return true;
}

// スマホ判定（iPadOSがMacを名乗るケースも拾う）
const IS_MOBILE=/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)||(navigator.maxTouchPoints>1&&/Macintosh/i.test(navigator.userAgent));
// ① 送信ボタン → まずプレビュー（確認画面）を出す
function openPreview(){
  if(!validate())return;
  $('pvTo').textContent=$('toAddr').value.trim();
  $('pvSubj').textContent=buildSubject();
  $('pvBody').textContent=buildBody();
  $('previewModal').classList.add('show');
}
function closePreview(){$('previewModal').classList.remove('show')}
// ② 確認画面で「この内容で送信」→ 実際にメールアプリ/Gmail作成画面を開く
function confirmSend(){
  addHistory(); // 送信操作の控えを端末に残す
  const to=encodeURIComponent($('toAddr').value.trim());
  const su=encodeURIComponent(buildSubject());
  // メールの改行はCRLFにする（LFだけだとiPhoneのGmail等で改行が消えて詰まって見えるため）
  const body=encodeURIComponent(buildBody().replace(/\r?\n/g,'\r\n'));
  closePreview();
  if(IS_MOBILE){
    // スマホ：既定のメールアプリ（Gmail等）を、宛先・件名・本文すべて入った状態で開く
    location.href=`mailto:${to}?subject=${su}&body=${body}`;
  }else{
    // パソコン：ブラウザのGmail作成画面を内容入りで開く
    window.open(`https://mail.google.com/mail/?view=cm&fs=1&to=${to}&su=${su}&body=${body}`,'_blank');
  }
  // 送信操作のあとはフォームを新しい状態に戻す（控えは🕘履歴に残る／依頼者・実行者・送信先は保持）
  clearFormSilent();
  showToast('メール作成を開きました。控えは🕘履歴に残しています');
}
// 送信後にフォームを新規状態へ（確認なし・依頼者/実行者/送信先は残す）
function clearFormSilent(){
  ['dueDate','place','methodEmail','methodPhone','content','detail','deadlineDate','deadlineTime','midWhen','other'].forEach(id=>$(id).value='');
  document.querySelectorAll('#methodPills input').forEach(c=>c.checked=false);
  document.querySelectorAll('input[name=prio]').forEach(r=>r.checked=false);
  document.querySelector('input[name=mid][value="なし"]').checked=true;
  $('reqDate').value=todayStr();
  applyToggles(); saveDraft();
}

// toast
let toastT;
function showToast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2600)}

// ── 初期化 ──
$('reqDate').value=todayStr();
$('toAddr').value=localStorage.getItem(TO_KEY)||'kamikamigift@gmail.com';
if(!loadDraft()){ $('requester').value=localStorage.getItem(REQ_KEY)||''; }
applyToggles();
renderBadge();
$('toAddr').addEventListener('change',()=>localStorage.setItem(TO_KEY,$('toAddr').value.trim()));
$('requester').addEventListener('change',()=>localStorage.setItem(REQ_KEY,$('requester').value.trim()));
// どの入力でも下書きを自動保存（送信するまで消えない）
document.addEventListener('input',saveDraft);
document.addEventListener('change',()=>{applyToggles();saveDraft()});
</script>
